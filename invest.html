<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invest & Grow - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
        }
        .topbar {
            background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 100%);
            color: #fff;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .logo { font-size: 28px; font-weight: 800; color: #f5c842; }
        .topbar .logo span { color: #fff; }
        .topbar .logo .play-icon { color: #f5c842; margin-right: 5px; }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .topbar .user-info .greeting { color: #ddd; font-size: 14px; }
        .topbar .user-info .greeting strong { color: #f5c842; font-weight: 700; }
        .topbar .user-info .balance-badge {
            background: rgba(245, 200, 66, 0.15);
            border: 1px solid #f5c842;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            color: #f5c842;
        }
        .topbar .user-info .logout {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
        }
        .topbar .user-info .logout:hover { background: #e74c3c; color: #fff; }
        .topbar .back-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }
        .topbar .back-btn:hover { background: rgba(255,255,255,0.2); }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 25px 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px 35px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 25px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }
        .card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0d1b2a;
            margin-bottom: 6px;
        }
        .card .subtitle {
            color: #888;
            font-size: 15px;
            margin-bottom: 20px;
        }
        .card .price {
            font-size: 36px;
            font-weight: 800;
            color: #f5c842;
        }
        .bank-details {
            background: #e8f5e9;
            padding: 20px 25px;
            border-radius: 16px;
            border-left: 5px solid #2e7d32;
            margin: 15px 0;
        }
        .bank-details p {
            font-size: 15px;
            margin: 5px 0;
            color: #1a1a2e;
        }
        .bank-details strong {
            color: #0d1b2a;
        }
        .bank-details .number {
            font-size: 24px;
            font-weight: 800;
            color: #0d1b2a;
            letter-spacing: 2px;
        }
        .btn {
            display: inline-block;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }
        .btn-gold {
            background: #f5c842;
            color: #0d1b2a;
        }
        .btn-gold:hover {
            background: #e6b800;
            transform: scale(1.02);
        }
        .btn-block {
            width: 100%;
        }
        .referral-link-box {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px dashed #f5c842;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .referral-link-box .link-text {
            color: #0d1b2a;
            font-weight: 500;
            font-size: 14px;
            word-break: break-all;
            flex: 1;
        }
        .referral-link-box .copy-btn {
            background: #0d1b2a;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }
        .referral-link-box .copy-btn:hover {
            background: #1b3a5c;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            background: #fafbfc;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #f5c842;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.1);
        }
        .notification {
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }
        .notification.show {
            display: block;
        }
        .notification.success {
            background: #e8f5e9;
            color: #1b5e20;
            border-left: 5px solid #2e7d32;
        }
        .notification.error {
            background: #fce4ec;
            color: #b71c1c;
            border-left: 5px solid #c62828;
        }
        .notification.info {
            background: #e3f2fd;
            color: #0d47a1;
            border-left: 5px solid #0d47a1;
        }
        .footer {
            background: #0d1b2a;
            color: #aaa;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-radius: 20px 20px 0 0;
        }
        .footer .founder {
            color: #f5c842;
            font-weight: 600;
        }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .badge-warning {
            background: #fff3e0;
            color: #e65100;
        }
        .file-upload {
            border: 2px dashed #e8ecf0;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-upload:hover {
            border-color: #f5c842;
            background: #fef7e0;
        }
        .invest-status-box {
            background: #fff3e0;
            padding: 15px 20px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 5px solid #e65100;
        }
        .invest-status-box .status-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        .invest-status-box .status-text {
            font-weight: 600;
            color: #e65100;
        }
        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
                padding: 15px;
            }
            .topbar .user-info {
                justify-content: center;
            }
            .card {
                padding: 20px;
            }
            .bank-details .number {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">
            <span class="play-icon">▶</span>Cash<span>Vista</span>
        </div>
        <div class="user-info">
            <span class="greeting">👋 Welcome, <strong id="userName">User</strong></span>
            <span class="balance-badge">💰 <span id="userBalance">₦0.00</span></span>
            <a href="dashboard.html" class="back-btn">← Dashboard</a>
            <button class="logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div class="container">

        <div id="notification" class="notification">
            <span id="notificationMessage"></span>
        </div>

        <!-- ===== INVEST & GROW CARD ===== -->
        <div class="card" id="investCard">
            <h2>📈 Invest & Grow</h2>
            <p class="subtitle">Pay ₦5,000 to unlock your permanent referral link and start earning 55% commission!</p>
            
            <div style="text-align:center; margin:10px 0;">
                <span class="price">₦5,000</span>
                <span style="display:block; font-size:13px; color:#888;">One-time investment</span>
            </div>

            <div id="investContent">
                <!-- This will be populated by JavaScript -->
                <div style="text-align:center; padding:20px; color:#888;">Loading...</div>
            </div>
        </div>

    </div>

    <footer class="footer">
        <p>&copy; 2026 CashVista. All rights reserved.</p>
        <p class="founder">Designed & Built by Stephen Melek Elisha</p>
    </footer>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';
        const APP_URL = 'https://cashvista.vercel.app';

        let currentUser = null;

        // =============================================
        // GET LOGGED-IN USER
        // =============================================
        async function getLoggedInUser() {
            // Check sessionStorage first
            let userEmail = sessionStorage.getItem('userEmail');
            
            // If not in sessionStorage, check localStorage
            if (!userEmail) {
                const stored = localStorage.getItem('cashvista_user');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        userEmail = parsed.email;
                        if (userEmail) {
                            sessionStorage.setItem('userEmail', userEmail);
                            if (parsed.name) sessionStorage.setItem('userName', parsed.name);
                        }
                    } catch (e) {}
                }
            }

            if (!userEmail) {
                window.location.href = 'login.html';
                return null;
            }

            try {
                const response = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(userEmail), {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });

                if (!response.ok) {
                    window.location.href = 'login.html';
                    return null;
                }

                const users = await response.json();

                if (!users || users.length === 0) {
                    window.location.href = 'login.html';
                    return null;
                }

                currentUser = users[0];
                localStorage.setItem('cashvista_user', JSON.stringify(currentUser));
                sessionStorage.setItem('userEmail', currentUser.email);
                if (currentUser.name) sessionStorage.setItem('userName', currentUser.name);

                document.getElementById('userName').textContent = currentUser.name || 'User';
                document.getElementById('userBalance').textContent = '₦' + (currentUser.balance || 0).toLocaleString();

                return currentUser;
            } catch (e) {
                console.error('Error fetching user:', e);
                window.location.href = 'login.html';
                return null;
            }
        }

        // =============================================
        // SHOW NOTIFICATION
        // =============================================
        function showNotification(message, type) {
            const el = document.getElementById('notification');
            const msg = document.getElementById('notificationMessage');
            el.className = 'notification show ' + (type || 'info');
            msg.textContent = message;
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }

        // =============================================
        // CHECK IF USER IS ALREADY INVEST MEMBER
        // =============================================
        function isInvestMember(user) {
            return user && user.is_invest_member === true;
        }

        // =============================================
        // GET REFERRAL LINK
        // =============================================
        function getReferralLink(user) {
            if (user.referral_link && user.referral_link !== 'Not generated yet' && user.referral_link !== 'Not generated') {
                return user.referral_link.replace('cashvista.com', 'cashvista.vercel.app');
            }
            const code = user.referral_code || 'REF_' + Date.now() + '_' + (user.email || '').split('@')[0];
            return APP_URL + '/register.html?ref=' + code;
        }

        // =============================================
        // RENDER INVEST PAGE - NO ALERT, FULL PAGE LOADS
        // =============================================
        function renderInvestPage(user) {
            const container = document.getElementById('investContent');
            
            if (isInvestMember(user)) {
                // ===== ALREADY INVEST MEMBER - SHOW REFERRAL LINK =====
                const refLink = getReferralLink(user);
                
                container.innerHTML = `
                    <div style="text-align:center; padding:15px 0;">
                        <div style="font-size:48px; margin-bottom:10px;">🎉</div>
                        <h3 style="color:#2e7d32; margin-bottom:5px;">You are already an Invest & Grow member!</h3>
                        <p style="color:#888; margin-bottom:15px;">Here is your permanent referral link:</p>
                        
                        <div class="referral-link-box">
                            <span class="link-text" id="referralLinkDisplay">${refLink}</span>
                            <button class="copy-btn" onclick="copyReferralLink()">📋 Copy</button>
                        </div>
                        
                        <div style="margin-top:15px; font-size:13px; color:#888;">
                            <p>💡 Share this link with others</p>
                            <p>💰 You earn 55% commission on every referral!</p>
                            <p>👥 Track your referrals from your dashboard</p>
                        </div>
                        
                        <button class="btn btn-gold btn-block" style="margin-top:15px;" onclick="window.location.href='dashboard.html'">
                            ← Back to Dashboard
                        </button>
                    </div>
                `;
                
            } else {
                // ===== NOT INVEST MEMBER - SHOW PAYMENT FORM =====
                container.innerHTML = `
                    <div style="text-align:center; padding:10px 0;">
                        <div class="invest-status-box">
                            <span class="status-icon">⚠️</span>
                            <span class="status-text">You are not yet an Invest & Grow member</span>
                        </div>
                        
                        <p style="color:#888; margin:15px 0;">
                            Unlock your referral link by making a one-time payment of ₦5,000
                        </p>
                        
                        <div class="bank-details">
                            <p><strong>🏦 Bank:</strong> United Bank for Africa (UBA)</p>
                            <p><strong>📋 Account Name:</strong> Stephen Melek Elisha</p>
                            <p><strong>🔢 Account Number:</strong> <span class="number">1024967569</span></p>
                            <p style="font-size:13px; color:#555; margin-top:8px;">
                                After payment, upload your receipt below and click "Submit Payment"
                            </p>
                        </div>
                        
                        <form id="investForm">
                            <div class="form-group">
                                <label>Upload Payment Receipt *</label>
                                <div class="file-upload" onclick="document.getElementById('receiptInput').click()">
                                    <div style="font-size:40px;">📤</div>
                                    <p style="color:#888; font-size:14px;">Click to upload receipt image (PNG, JPG)</p>
                                    <input type="file" id="receiptInput" accept="image/*" style="display:none;" required />
                                </div>
                                <div id="fileNameDisplay" style="font-size:13px; color:#2e7d32; margin-top:5px;"></div>
                            </div>
                            
                            <div class="form-group">
                                <label>Transaction Reference (Optional)</label>
                                <input type="text" id="transactionRef" placeholder="Enter transaction reference or leave blank" />
                            </div>
                            
                            <button type="submit" class="btn btn-gold btn-block" style="margin-top:10px;">
                                💰 Submit Payment & Unlock Link
                            </button>
                        </form>
                    </div>
                `;

                // ===== FILE INPUT HANDLER =====
                document.getElementById('receiptInput').addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    const display = document.getElementById('fileNameDisplay');
                    if (file) {
                        display.textContent = '✅ ' + file.name + ' (selected)';
                    } else {
                        display.textContent = '';
                    }
                });

                // ===== FORM SUBMIT HANDLER =====
                document.getElementById('investForm').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    await submitInvestPayment(currentUser);
                });
            }
        }

        // =============================================
        // SUBMIT INVEST PAYMENT
        // =============================================
        async function submitInvestPayment(user) {
            const receiptInput = document.getElementById('receiptInput');
            const transactionRef = document.getElementById('transactionRef').value.trim();

            if (!receiptInput.files || receiptInput.files.length === 0) {
                showNotification('❌ Please upload a payment receipt image.', 'error');
                return;
            }

            const file = receiptInput.files[0];
            
            try {
                showNotification('⏳ Uploading receipt and processing...', 'info');

                // ===== UPLOAD RECEIPT TO SUPABASE STORAGE =====
                const fileExt = file.name.split('.').pop();
                const fileName = `invest_slips/${user.email.replace(/[^a-zA-Z0-9]/g, '_')}_${Date.now()}.${fileExt}`;
                const formData = new FormData();
                formData.append('file', file);

                const uploadResponse = await fetch(SUPABASE_URL + '/storage/v1/object/cashvista/' + fileName, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: formData
                });

                if (!uploadResponse.ok) {
                    throw new Error('Failed to upload receipt');
                }

                const receiptUrl = SUPABASE_URL + '/storage/v1/object/public/cashvista/' + fileName;

                // ===== CREATE INVEST RECORD =====
                const investData = {
                    user_email: user.email,
                    amount: 5000,
                    receipt_url: receiptUrl,
                    transaction_ref: transactionRef || 'N/A',
                    status: 'pending',
                    date: new Date().toISOString()
                };

                const response = await fetch(SUPABASE_URL + '/rest/v1/invest_members', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(investData)
                });

                if (!response.ok) {
                    throw new Error('Failed to submit investment request');
                }

                // ===== LOG ACTIVITY =====
                await fetch(SUPABASE_URL + '/rest/v1/activity', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        user_email: user.email,
                        user_name: user.name || 'User',
                        action: 'Submitted Invest & Grow payment of ₦5,000',
                        amount: 5000,
                        date: new Date().toISOString()
                    })
                });

                showNotification('✅ Payment submitted! Admin will approve and unlock your referral link shortly.', 'success');

                // ===== RESET FORM =====
                document.getElementById('receiptInput').value = '';
                document.getElementById('fileNameDisplay').textContent = '';
                document.getElementById('transactionRef').value = '';

                // ===== RELOAD PAGE AFTER 3 SECONDS =====
                setTimeout(() => {
                    window.location.reload();
                }, 3000);

            } catch (error) {
                console.error('Error submitting invest:', error);
                showNotification('❌ Error: ' + error.message, 'error');
            }
        }

        // =============================================
        // COPY REFERRAL LINK
        // =============================================
        function copyReferralLink() {
            const linkElement = document.getElementById('referralLinkDisplay');
            if (!linkElement) return;
            
            const link = linkElement.textContent;
            if (link && link !== 'Loading...') {
                navigator.clipboard.writeText(link).then(() => {
                    showNotification('✅ Referral link copied to clipboard!', 'success');
                }).catch(() => {
                    const input = document.createElement('input');
                    input.value = link;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    showNotification('✅ Referral link copied!', 'success');
                });
            }
        }

        // =============================================
        // LOGOUT
        // =============================================
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('userEmail');
                sessionStorage.removeItem('userName');
                localStorage.removeItem('cashvista_user');
                window.location.href = 'login.html';
            }
        }

        // =============================================
        // INIT - PAGE LOADS FULLY NO MATTER WHAT
        // =============================================
        document.addEventListener('DOMContentLoaded', async function() {
            const user = await getLoggedInUser();
            if (user) {
                renderInvestPage(user);
            } else {
                // Show login prompt if no user
                document.getElementById('investContent').innerHTML = `
                    <div style="text-align:center; padding:30px;">
                        <div style="font-size:48px;">🔐</div>
                        <h3>Please Login</h3>
                        <p style="color:#888;">You need to be logged in to access this page.</p>
                        <a href="login.html" class="btn btn-gold" style="margin-top:15px;">🔑 Login</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
