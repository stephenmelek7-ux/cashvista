<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - CashVista</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== RESET & BASE ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #0d1b2a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* ===== LOGIN CONTAINER ===== */
      .login-container {
        background: #fff;
        padding: 40px 35px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 400px;
      }
      .login-container .logo {
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        color: #0d1b2a;
      }
      .login-container .logo span {
        color: #f5c842;
      }
      .login-container .logo .play-icon {
        color: #f5c842;
      }
      .login-container .admin-badge {
        display: block;
        text-align: center;
        background: #f5c842;
        color: #0d1b2a;
        padding: 4px 16px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 700;
        margin: 0 auto 10px;
        width: fit-content;
      }
      .login-container .subtitle {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 25px;
      }
      .login-container label {
        font-weight: 600;
        color: #333;
        display: block;
        margin-top: 12px;
        font-size: 14px;
      }
      .login-container input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e8ecf0;
        border-radius: 12px;
        font-size: 15px;
        margin-top: 5px;
        transition: 0.3s;
        background: #fafbfc;
      }
      .login-container input:focus {
        border-color: #f5c842;
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.1);
      }
      .login-container .btn {
        background: #f5c842;
        color: #0d1b2a;
        border: none;
        padding: 14px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 17px;
        width: 100%;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.3s;
      }
      .login-container .btn:hover {
        background: #e6b800;
      }
      .login-container .links {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }
      .login-container .links a {
        color: #0d1b2a;
        font-weight: 600;
        text-decoration: none;
      }
      .login-container .links a:hover {
        color: #f5c842;
      }
      .footer-credit {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
      }
      .footer-credit .founder {
        color: #f5c842;
      }
      .notification {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: none;
        font-weight: 500;
        font-size: 14px;
      }
      .notification.error {
        background: #fce4ec;
        color: #c62828;
        display: block;
        border-left: 4px solid #c62828;
      }
      .notification.success {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
        border-left: 4px solid #2e7d32;
      }
      @media (max-width: 480px) {
        .login-container {
          padding: 25px 20px;
          margin: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <span class="admin-badge">🔐 ADMIN PORTAL</span>
      <div class="logo">
        <span class="play-icon">▶</span>Cash<span>Vista</span>
      </div>
      <p class="subtitle">Admin Control Panel Login</p>
      <div id="notification" class="notification"></div>
      <form id="adminLoginForm">
        <label>Admin Email</label>
        <input
          type="email"
          id="adminEmail"
          placeholder="admin@cashvista.com"
          required
        />
        <label>Password</label>
        <input
          type="password"
          id="adminPassword"
          placeholder="Enter admin password"
          required
        />
        <button type="submit" class="btn">Login to Admin Panel</button>
      </form>
      <p class="links"><a href="index.html">← Back to Homepage</a></p>
      <div class="footer-credit">
        <p class="founder">Designed by Stephen Melek Elisha</p>
      </div>
    </div>
    <script>
      // =============================================
      // ADMIN CREDENTIALS (CHANGE THESE)
      // =============================================
      const ADMIN_EMAIL = 'Stephenmelekglobal@gmail.com';
      const ADMIN_PASSWORD = 'Melek088220';

      document
        .getElementById('adminLoginForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          const email = document.getElementById('adminEmail').value.trim();
          const password = document
            .getElementById('adminPassword')
            .value.trim();
          const notification = document.getElementById('notification');

          if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            // ✅ Login successful
            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', email);

            notification.className = 'notification success';
            notification.textContent =
              '✅ Login successful! Redirecting to admin dashboard...';

            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 1000);
          } else {
            notification.className = 'notification error';
            notification.textContent =
              '❌ Invalid admin email or password. Please try again.';
          }
        });

      // =============================================
      // AUTO-REDIRECT IF ALREADY LOGGED IN
      // =============================================
      if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        window.location.href = 'admin.html';
      }
    </script>
  </body>
</html>
