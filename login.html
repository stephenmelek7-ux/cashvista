<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CashVista</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        .login-container .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #0d1b2a;
        }
        .login-container .logo span { color: #f5c842; }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .login-container label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-top: 12px;
            font-size: 14px;
        }
        .login-container input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 5px;
        }
        .login-container .btn {
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
        .login-container .btn:hover { background: #e6b800; }
        .login-container .links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
        .login-container .links a {
            color: #0d1b2a;
            font-weight: 600;
            text-decoration: none;
        }
        .notification {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .notification.error {
            background: #fce4ec;
            color: #c62828;
            display: block;
            border-left: 4px solid #c62828;
        }
        .notification.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border-left: 4px solid #2e7d32;
        }
        .notification.info {
            background: #e3f2fd;
            color: #0d47a1;
            display: block;
            border-left: 4px solid #0d47a1;
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            background: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        .google-btn:hover { background: #f8fafc; }
        .divider {
            border: none;
            border-top: 1px solid #e8ecf0;
            margin: 15px 0;
        }
        .forgot-link {
            text-align: right;
            margin-top: 6px;
        }
        .forgot-link a {
            font-size: 13px;
            color: #f5c842;
            text-decoration: none;
        }
        .footer-credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        .footer-credit .founder { color: #f5c842; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span>▶</span>Cash<span>Vista</span>
        </div>
        <p class="subtitle">Welcome back! Login to your account</p>
        <div id="notification" class="notification"></div>
        <form id="loginForm">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
            <div class="forgot-link">
                <a href="forgot-password.html">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>

        <hr class="divider" />
        <p style="text-align:center; color:#888; font-size:13px;">Or continue with</p>
        <button class="google-btn" onclick="googleLogin()">
            G Sign in with Google
        </button>

        <p class="links">Don't have an account? <a href="register.html">Sign up free</a></p>
        <div class="footer-credit">
            <p class="founder">Designed by Stephen Melek Elisha</p>
        </div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION - CORRECT KEYS
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const notification = document.getElementById('notification');

            if (!email || !password) {
                notification.className = 'notification error';
                notification.textContent = '❌ Please enter both email and password.';
                return;
            }

            try {
                notification.className = 'notification info';
                notification.textContent = '⏳ Logging in...';

                const response = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email), {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });

                if (!response.ok) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Connection error. Please try again.';
                    return;
                }

                const users = await response.json();

                if (!users || users.length === 0) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Invalid email or password.';
                    return;
                }

                const user = users[0];

                if (user.password !== password) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Invalid email or password.';
                    return;
                }

                if (user.is_active === false) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Your account has been suspended.';
                    return;
                }

                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userName', user.name);

                notification.className = 'notification success';
                notification.textContent = '✅ Login successful! Redirecting...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                notification.className = 'notification error';
                notification.textContent = '❌ Connection error. Please try again.';
                console.error('Error:', error);
            }
        });

        function googleLogin() {
            alert('🔐 Google login will be available soon. Please use email/password for now.');
        }
    </script>
</body>
</html>
