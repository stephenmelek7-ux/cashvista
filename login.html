<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        .login-container .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #0d1b2a;
        }
        .login-container .logo span { color: #f5c842; }
        .login-container .logo .play-icon { color: #f5c842; }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .login-container label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-top: 12px;
            font-size: 14px;
        }
        .login-container input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 5px;
            transition: 0.3s;
            background: #fafbfc;
        }
        .login-container input:focus {
            border-color: #f5c842;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.1);
        }
        .login-container .btn {
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-container .btn:hover { background: #e6b800; }
        .login-container .links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
        .login-container .links a {
            color: #0d1b2a;
            font-weight: 600;
            text-decoration: none;
        }
        .login-container .links a:hover { color: #f5c842; }
        .footer-credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        .footer-credit .founder { color: #f5c842; }
        .notification {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .notification.error {
            background: #fce4ec;
            color: #c62828;
            display: block;
            border-left: 4px solid #c62828;
        }
        .notification.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border-left: 4px solid #2e7d32;
        }
        .notification.info {
            background: #e3f2fd;
            color: #0d47a1;
            display: block;
            border-left: 4px solid #0d47a1;
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            background: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: #f8fafc;
            border-color: #f5c842;
        }
        .google-btn .g-icon {
            font-size: 20px;
            font-weight: 700;
            color: #ea4335;
        }
        .divider {
            border: none;
            border-top: 1px solid #e8ecf0;
            margin: 15px 0;
        }
        .forgot-link {
            text-align: right;
            margin-top: 6px;
        }
        .forgot-link a {
            font-size: 13px;
            color: #f5c842;
            text-decoration: none;
        }
        .forgot-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-container { padding: 25px 20px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="play-icon">▶</span>Cash<span>Vista</span>
        </div>
        <p class="subtitle">Welcome back! Login to your account</p>
        <div id="notification" class="notification"></div>
        <form id="loginForm">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
            <div class="forgot-link">
                <a href="forgot-password.html">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>

        <hr class="divider" />
        <p style="text-align:center; color:#888; font-size:13px;">Or continue with</p>
        <button class="google-btn" onclick="googleLogin()">
            <span class="g-icon">G</span> Sign in with Google
        </button>

        <p class="links">Don't have an account? <a href="register.html">Sign up free</a></p>
        <div class="footer-credit">
            <p class="founder">Designed by Stephen Melek Elisha</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ng3ZsQ3TmI540';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const notification = document.getElementById('notification');

            if (!email || !password) {
                notification.className = 'notification error';
                notification.textContent = '❌ Please enter both email and password.';
                return;
            }

            try {
                notification.className = 'notification info';
                notification.textContent = '⏳ Logging in...';

                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();

                if (error || !data) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Invalid email or password.';
                    return;
                }

                if (data.password !== password) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Invalid email or password.';
                    return;
                }

                if (data.is_active === false) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Your account has been suspended.';
                    return;
                }

                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userName', data.name);

                await supabase
                    .from('users')
                    .update({ last_login: new Date().toISOString() })
                    .eq('email', email);

                notification.className = 'notification success';
                notification.textContent = '✅ Login successful! Redirecting...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                notification.className = 'notification error';
                notification.textContent = '❌ ' + error.message;
            }
        });

        async function googleLogin() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });

                if (error) {
                    alert('❌ Google login failed: ' + error.message);
                }
            } catch (error) {
                alert('❌ An error occurred during Google login.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
