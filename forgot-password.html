<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - CashVista</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        background: #fff;
        padding: 40px 35px;
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 420px;
      }
      .container .logo {
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        color: #0d1b2a;
      }
      .container .logo span {
        color: #f5c842;
      }
      .container .logo .play-icon {
        color: #f5c842;
      }
      .container .subtitle {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 25px;
      }
      .container label {
        font-weight: 600;
        color: #333;
        display: block;
        margin-top: 12px;
        font-size: 14px;
      }
      .container input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e8ecf0;
        border-radius: 12px;
        font-size: 15px;
        margin-top: 5px;
        transition: 0.3s;
        background: #fafbfc;
      }
      .container input:focus {
        border-color: #f5c842;
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.1);
      }
      .container .btn {
        background: #f5c842;
        color: #0d1b2a;
        border: none;
        padding: 14px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 17px;
        width: 100%;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.3s;
      }
      .container .btn:hover {
        background: #e6b800;
      }
      .container .links {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }
      .container .links a {
        color: #0d1b2a;
        font-weight: 600;
        text-decoration: none;
      }
      .container .links a:hover {
        color: #f5c842;
      }
      .footer-credit {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
      }
      .footer-credit .founder {
        color: #f5c842;
      }
      .notification {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: none;
        font-weight: 500;
        font-size: 14px;
      }
      .notification.error {
        background: #fce4ec;
        color: #c62828;
        display: block;
        border-left: 4px solid #c62828;
      }
      .notification.success {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
        border-left: 4px solid #2e7d32;
      }
      .notification.info {
        background: #e3f2fd;
        color: #0d47a1;
        display: block;
        border-left: 4px solid #0d47a1;
      }
      @media (max-width: 480px) {
        .container {
          padding: 25px 20px;
          margin: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <span class="play-icon">▶</span>Cash<span>Vista</span>
      </div>
      <p class="subtitle">Reset your password</p>
      <div id="notification" class="notification"></div>

      <!-- Step 1: Enter Email -->
      <div id="step1">
        <p style="color: #555; font-size: 14px; margin-bottom: 15px">
          Enter the email address you used to register. We'll send you a
          password reset code.
        </p>
        <form id="forgotForm">
          <label>Email Address</label>
          <input
            type="email"
            id="resetEmail"
            placeholder="you@example.com"
            required
          />
          <button type="submit" class="btn">Send Reset Code</button>
        </form>
      </div>

      <!-- Step 2: Enter Code & New Password -->
      <div id="step2" style="display: none">
        <p style="color: #555; font-size: 14px; margin-bottom: 15px">
          Enter the 6-digit code sent to your email and set a new password.
        </p>
        <form id="resetForm">
          <label>Reset Code</label>
          <input
            type="text"
            id="resetCode"
            placeholder="Enter 6-digit code"
            maxlength="6"
            required
          />
          <label>New Password</label>
          <input
            type="password"
            id="newPassword"
            placeholder="Min 6 characters"
            required
          />
          <label>Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm new password"
            required
          />
          <button type="submit" class="btn">Reset Password</button>
        </form>
      </div>

      <p class="links"><a href="login.html">← Back to Login</a></p>
      <div class="footer-credit">
        <p class="founder">Designed by Stephen Melek Elisha</p>
      </div>
    </div>

    <script>
      // Store reset code temporarily
      let generatedCode = '';
      let resetEmail = '';

      document
        .getElementById('forgotForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();
          const email = document.getElementById('resetEmail').value.trim();
          const notification = document.getElementById('notification');

          if (!email || !email.includes('@')) {
            notification.className = 'notification error';
            notification.textContent = '❌ Please enter a valid email address.';
            return;
          }

          // Check if user exists
          const users = JSON.parse(
            localStorage.getItem('cashvista_users') || '[]'
          );
          const user = users.find((u) => u.email === email);

          if (!user) {
            notification.className = 'notification error';
            notification.textContent = '❌ No account found with this email.';
            return;
          }

          // Generate 6-digit code
          generatedCode = String(Math.floor(100000 + Math.random() * 900000));
          resetEmail = email;

          // Store code in localStorage for verification
          localStorage.setItem('reset_code_' + email, generatedCode);
          localStorage.setItem(
            'reset_code_expiry_' + email,
            Date.now() + 600000
          ); // 10 minutes expiry

          // Show step 2
          document.getElementById('step1').style.display = 'none';
          document.getElementById('step2').style.display = 'block';

          notification.className = 'notification success';
          notification.textContent =
            '✅ Reset code sent to ' +
            email +
            '. Check your email (demo: ' +
            generatedCode +
            ')';
        });

      document
        .getElementById('resetForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();
          const code = document.getElementById('resetCode').value.trim();
          const newPassword = document
            .getElementById('newPassword')
            .value.trim();
          const confirmPassword = document
            .getElementById('confirmPassword')
            .value.trim();
          const notification = document.getElementById('notification');

          if (!code) {
            notification.className = 'notification error';
            notification.textContent = '❌ Please enter the reset code.';
            return;
          }

          if (newPassword.length < 6) {
            notification.className = 'notification error';
            notification.textContent =
              '❌ Password must be at least 6 characters.';
            return;
          }

          if (newPassword !== confirmPassword) {
            notification.className = 'notification error';
            notification.textContent = '❌ Passwords do not match.';
            return;
          }

          // Verify code
          const storedCode = localStorage.getItem('reset_code_' + resetEmail);
          const expiry = localStorage.getItem(
            'reset_code_expiry_' + resetEmail
          );

          if (!storedCode || !expiry) {
            notification.className = 'notification error';
            notification.textContent =
              '❌ Invalid or expired reset code. Please request a new one.';
            return;
          }

          if (Date.now() > Number(expiry)) {
            notification.className = 'notification error';
            notification.textContent =
              '❌ Reset code has expired. Please request a new one.';
            localStorage.removeItem('reset_code_' + resetEmail);
            localStorage.removeItem('reset_code_expiry_' + resetEmail);
            return;
          }

          if (code !== storedCode) {
            notification.className = 'notification error';
            notification.textContent =
              '❌ Invalid reset code. Please try again.';
            return;
          }

          // Update password
          let users = JSON.parse(
            localStorage.getItem('cashvista_users') || '[]'
          );
          const index = users.findIndex((u) => u.email === resetEmail);
          if (index !== -1) {
            users[index].password = newPassword;
            localStorage.setItem('cashvista_users', JSON.stringify(users));
          }

          // Clean up
          localStorage.removeItem('reset_code_' + resetEmail);
          localStorage.removeItem('reset_code_expiry_' + resetEmail);

          notification.className = 'notification success';
          notification.textContent =
            '✅ Password reset successful! Redirecting to login...';

          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        });
    </script>
  </body>
</html>
