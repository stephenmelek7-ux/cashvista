<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        .register-container .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #0d1b2a;
        }
        .register-container .logo span { color: #f5c842; }
        .register-container .logo .play-icon { color: #f5c842; }
        .register-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .register-container label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-top: 12px;
            font-size: 14px;
        }
        .register-container input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 5px;
            transition: 0.3s;
            background: #fafbfc;
        }
        .register-container input:focus {
            border-color: #f5c842;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(245,200,66,0.1);
        }
        .register-container .btn {
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .register-container .btn:hover { background: #e6b800; }
        .register-container .links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
        .register-container .links a {
            color: #0d1b2a;
            font-weight: 600;
            text-decoration: none;
        }
        .register-container .links a:hover { color: #f5c842; }
        .footer-credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        .footer-credit .founder { color: #f5c842; }
        .notification {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .notification.error {
            background: #fce4ec;
            color: #c62828;
            display: block;
            border-left: 4px solid #c62828;
        }
        .notification.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
            border-left: 4px solid #2e7d32;
        }
        .notification.info {
            background: #e3f2fd;
            color: #0d47a1;
            display: block;
            border-left: 4px solid #0d47a1;
        }
        .referral-badge {
            background: #fef7e0;
            border: 1px solid #f5c842;
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            color: #e65100;
        }
        @media (max-width: 480px) {
            .register-container { padding: 25px 20px; margin: 10px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <span class="play-icon">▶</span>Cash<span>Vista</span>
        </div>
        <p class="subtitle">Create your free account</p>
        <div id="referralInfo" class="referral-badge" style="display:none;">
            🔗 You were referred by someone! When you invest ₦5,000, they earn 55% commission.
        </div>
        <div id="notification" class="notification"></div>
        <form id="registerForm">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Your full name" required />
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="08012345678" required />
            <label>Username (Optional)</label>
            <input type="text" id="username" placeholder="Choose a unique username" />
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required />
            <input type="hidden" id="referralCode" value="" />
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p class="links">Already have an account? <a href="login.html">Login</a></p>
        <div class="footer-credit">
            <p class="founder">Designed by Stephen Melek Elisha</p>
        </div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';

        // =============================================
        // CAPTURE REFERRAL CODE FROM URL
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');

            if (refCode) {
                document.getElementById('referralCode').value = refCode;
                document.getElementById('referralInfo').style.display = 'block';
                document.getElementById('referralInfo').innerHTML = 
                    '🔗 You were referred by someone! When you invest ₦5,000, they earn 55% commission.';
            }
        });

        // =============================================
        // HELPER FUNCTIONS
        // =============================================
        async function fetchSupabase(table, email) {
            try {
                const response = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?email=eq.' + encodeURIComponent(email), {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                if (!response.ok) return [];
                return await response.json();
            } catch (e) {
                console.error('Fetch error:', e);
                return [];
            }
        }

        async function insertSupabase(table, data) {
            try {
                const response = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                return response.ok;
            } catch (e) {
                console.error('Insert error:', e);
                return false;
            }
        }

        // =============================================
        // REGISTER FORM SUBMIT
        // =============================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const referralCode = document.getElementById('referralCode').value.trim();
            const notification = document.getElementById('notification');

            if (!name) {
                notification.className = 'notification error';
                notification.textContent = '❌ Please enter your full name.';
                return;
            }
            if (!email || !email.includes('@')) {
                notification.className = 'notification error';
                notification.textContent = '❌ Please enter a valid email.';
                return;
            }
            if (password.length < 6) {
                notification.className = 'notification error';
                notification.textContent = '❌ Password must be at least 6 characters.';
                return;
            }

            try {
                notification.className = 'notification info';
                notification.textContent = '⏳ Creating your account...';

                const existing = await fetchSupabase('users', email);
                if (existing && existing.length > 0) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ This email is already registered. Please login.';
                    return;
                }

                // Save user with referral code
                const userData = {
                    name: name,
                    email: email,
                    phone: phone || '',
                    username: username || '',
                    password: password,
                    balance: 0,
                    total_earned: 0,
                    referrals: 0,
                    is_invest_member: false,
                    is_active: true,
                    joined_date: new Date().toISOString()
                };

                // If referral code exists, save it
                if (referralCode) {
                    userData.referred_by = referralCode;
                }

                const success = await insertSupabase('users', userData);

                if (!success) {
                    notification.className = 'notification error';
                    notification.textContent = '❌ Error creating account. Please try again.';
                    return;
                }

                sessionStorage.setItem('userEmail', email);

                notification.className = 'notification success';
                notification.textContent = '✅ Account created! Redirecting...';

                await fetch(SUPABASE_URL + '/rest/v1/activity', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        user_name: name,
                        action: referralCode ? 'Registered with referral: ' + referralCode : 'Registered',
                        amount: 0,
                        date: new Date().toISOString()
                    })
                });

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                notification.className = 'notification error';
                notification.textContent = '❌ ' + error.message;
            }
        });
    </script>
</body>
</html>
