<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 95%;
        }
        .register-container .logo {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
            text-align: center;
            margin-bottom: 5px;
        }
        .register-container .logo span { color: #0d1b2a; }
        .register-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .register-container .subtitle a {
            color: #f5c842;
            text-decoration: none;
            font-weight: 600;
        }
        .register-container .subtitle a:hover { text-decoration: underline; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #0d1b2a;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8ecf0;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            border-color: #f5c842;
            outline: none;
            box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.15);
        }
        .btn-register {
            width: 100%;
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-register:hover { background: #e6b800; transform: scale(1.02); }
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            background: #fce4ec;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .referral-info {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
            border-left: 3px solid #f5c842;
        }
        .referral-info strong { color: #0d1b2a; }
        .password-hint {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .terms {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
        .terms a { color: #f5c842; text-decoration: none; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #0d1b2a;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-text { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo">▶Cash<span>Vista</span></div>
        <p class="subtitle">Create your free account</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <div id="referralInfo" class="referral-info" style="display:none;">
            🔗 Referred by: <strong id="refName">Someone</strong>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required />
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 08012345678" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" />
                <div class="password-hint">Password must be at least 6 characters</div>
            </div>
            <button type="submit" class="btn-register" id="registerBtn">
                <span class="btn-text">Create Account</span>
            </button>
        </form>

        <p class="terms">
            By registering, you agree to our <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
        </p>
        <p class="terms" style="margin-top:8px;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';
        // =============================================
        // FIXED: APP URL - Using vercel.app not .com
        // =============================================
        const APP_URL = 'https://cashvista.vercel.app';

        // =============================================
        // GET REFERRAL CODE FROM URL
        // =============================================
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('ref');

        // =============================================
        // FETCH REFERRAL INFO
        // =============================================
        async function fetchReferralInfo(code) {
            try {
                const response = await fetch(SUPABASE_URL + '/rest/v1/users?referral_code=eq.' + code, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                if (!response.ok) return null;
                const data = await response.json();
                return data && data.length > 0 ? data[0] : null;
            } catch (e) {
                console.error('Error fetching referral:', e);
                return null;
            }
        }

        // =============================================
        // CHECK REFERRAL ON LOAD
        // =============================================
        if (referralCode) {
            document.getElementById('referralInfo').style.display = 'block';
            document.getElementById('refName').textContent = 'Loading...';
            
            fetchReferralInfo(referralCode).then(refUser => {
                if (refUser) {
                    document.getElementById('refName').textContent = refUser.name || refUser.email || 'Someone';
                } else {
                    document.getElementById('referralInfo').style.display = 'none';
                }
            });
        }

        // =============================================
        // REGISTER FORM SUBMIT
        // =============================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const registerBtn = document.getElementById('registerBtn');
            const btnText = registerBtn.querySelector('.btn-text');

            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Get values
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            // Validate
            if (!name || !email || !phone || !password) {
                errorMsg.textContent = '❌ Please fill in all fields.';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = '❌ Password must be at least 6 characters.';
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading
            registerBtn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> Creating...';

            try {
                // Check if email already exists
                const checkResponse = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email), {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                const existingUsers = await checkResponse.json();
                
                if (existingUsers && existingUsers.length > 0) {
                    errorMsg.textContent = '❌ This email is already registered. Please login instead.';
                    errorMsg.style.display = 'block';
                    registerBtn.disabled = false;
                    btnText.innerHTML = 'Create Account';
                    return;
                }

                // Generate referral code
                const uniqueId = 'REF_' + Date.now() + '_' + email.split('@')[0];
                // FIXED: Use APP_URL (cashvista.vercel.app) not cashvista.com
                const referralLink = APP_URL + '/register.html?ref=' + uniqueId;

                // Prepare user data
                const userData = {
                    name: name,
                    email: email,
                    phone: phone,
                    password: password,
                    balance: 0,
                    is_invest_member: false,
                    referral_code: uniqueId,
                    referral_link: referralLink,
                    referred_by: referralCode || null,
                    is_active: true,
                    joined_date: new Date().toISOString()
                };

                // Insert user
                const insertResponse = await fetch(SUPABASE_URL + '/rest/v1/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify(userData)
                });

                if (!insertResponse.ok) {
                    const errorData = await insertResponse.text();
                    console.error('Insert error:', errorData);
                    throw new Error('Registration failed. Please try again.');
                }

                // Success - store user session
                const user = { ...userData };
                delete user.password;
                localStorage.setItem('cashvista_user', JSON.stringify(user));

                // Update referrer's direct count if referred
                if (referralCode) {
                    try {
                        const refUser = await fetchReferralInfo(referralCode);
                        if (refUser) {
                            const newCount = (refUser.direct_count || 0) + 1;
                            await fetch(SUPABASE_URL + '/rest/v1/users?referral_code=eq.' + referralCode, {
                                method: 'PATCH',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'apikey': SUPABASE_KEY,
                                    'Authorization': 'Bearer ' + SUPABASE_KEY
                                },
                                body: JSON.stringify({ direct_count: newCount })
                            });
                        }
                    } catch (e) {
                        console.log('Could not update referrer count:', e);
                    }
                }

                successMsg.innerHTML = '✅ Account created successfully! Redirecting to dashboard...';
                successMsg.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                registerBtn.disabled = false;
                btnText.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
