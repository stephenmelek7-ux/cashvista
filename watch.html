<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch & Earn - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .watch-container {
            background: #fff;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 95%;
        }
        .watch-container .logo {
            font-size: 28px;
            font-weight: 800;
            color: #f5c842;
            text-align: center;
            margin-bottom: 5px;
        }
        .watch-container .logo span { color: #0d1b2a; }
        .watch-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .video-info {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #f5c842;
        }
        .video-info h3 {
            color: #0d1b2a;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .video-info p {
            color: #555;
            font-size: 14px;
        }
        .video-info .reward {
            font-size: 20px;
            font-weight: 800;
            color: #f5c842;
        }
        .video-wrapper {
            background: #0d1b2a;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 320px;
            border: none;
        }
        .video-wrapper .video-link-btn {
            display: inline-block;
            background: #f5c842;
            color: #0d1b2a;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
        }
        .video-wrapper .video-link-btn:hover {
            background: #e6b800;
            transform: scale(1.05);
        }
        .video-wrapper .video-placeholder {
            text-align: center;
            color: #fff;
            padding: 30px;
        }
        .video-wrapper .video-placeholder .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .timer-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #e8ecf0;
        }
        .timer-section .timer-display {
            font-size: 52px;
            font-weight: 800;
            color: #0d1b2a;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
        }
        .timer-section .timer-display.warning {
            color: #c62828;
            animation: blink 0.5s infinite;
        }
        .timer-section .timer-display.completed {
            color: #2e7d32;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .timer-section .earnings-display {
            font-size: 22px;
            font-weight: 700;
            color: #f5c842;
            margin-top: 5px;
        }
        .timer-section .status-text {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e8ecf0;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: #f5c842;
            border-radius: 4px;
            transition: width 1s linear;
            width: 0%;
        }
        .progress-bar .progress-fill.completed {
            background: #2e7d32;
        }
        .progress-bar .progress-fill.warning {
            background: #c62828;
        }
        .btn-stop {
            width: 100%;
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-stop:hover { background: #c62828; transform: scale(1.02); }
        .btn-stop:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-completed {
            width: 100%;
            background: #2e7d32;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-completed:hover { background: #1b5e20; transform: scale(1.02); }
        .btn-completed:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .summary-box {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid #e8ecf0;
            display: none;
        }
        .summary-box .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 14px;
        }
        .summary-box .row .label { color: #888; }
        .summary-box .row .value { font-weight: 700; color: #0d1b2a; }
        .summary-box .row .value.gold { color: #f5c842; }
        .error-msg {
            background: #fce4ec;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .btn-back {
            display: inline-block;
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            margin-top: 10px;
            text-align: center;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }
        .btn-back:hover { background: #ccc; }
        .no-video-msg {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .no-video-msg .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .no-video-msg h3 {
            color: #0d1b2a;
            margin-bottom: 10px;
        }
        .video-list {
            margin-top: 15px;
        }
        .video-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e8ecf0;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-list-item:hover {
            border-color: #f5c842;
            background: #fef7e0;
        }
        .video-list-item .info {
            flex: 1;
        }
        .video-list-item .info h4 {
            font-size: 15px;
            color: #0d1b2a;
        }
        .video-list-item .info .meta {
            font-size: 12px;
            color: #888;
        }
        .video-list-item .info .reward-sm {
            font-size: 14px;
            font-weight: 700;
            color: #f5c842;
        }
        .video-list-item .btn-select {
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-list-item .btn-select:hover {
            background: #e6b800;
        }
        .video-list-item .btn-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .debug-info {
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #555;
            margin-top: 15px;
            border: 1px dashed #ccc;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        @media (max-width: 500px) {
            .watch-container { padding: 20px 15px; }
            .video-wrapper iframe { height: 200px; }
            .timer-section .timer-display { font-size: 36px; }
            .video-list-item {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="watch-container">
        <div class="logo">▶Cash<span>Vista</span></div>
        <p class="subtitle">🎬 Watch & Earn</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <!-- ===== VIDEO PLAYER SECTION ===== -->
        <div id="videoPlayerSection" style="display:none;">
            <div class="video-info">
                <h3 id="videoTitle">Loading video...</h3>
                <p>⏱️ Duration: <span id="videoDuration">0</span></p>
                <p>💰 Reward: <span class="reward" id="videoReward">₦0</span></p>
            </div>

            <div class="video-wrapper" id="videoWrapper">
                <div class="video-placeholder" id="videoPlaceholder">
                    <div class="icon">📹</div>
                    <p>Loading video...</p>
                </div>
                <iframe id="videoFrame" src="" allowfullscreen style="display:none;"></iframe>
                <a href="#" id="videoLinkBtn" class="video-link-btn" target="_blank" style="display:none;">
                    ▶️ Watch on External Site
                </a>
            </div>

            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="earnings-display">💰 <span id="currentEarnings">₦0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">⏳ Loading...</div>
            </div>

            <button class="btn-stop" id="stopBtn" onclick="stopWatching()">⏹️ Stop & Claim Earnings</button>

            <div class="summary-box" id="summaryBox">
                <div class="row"><span class="label">⏱️ Time Watched</span><span class="value" id="summaryTime">0s</span></div>
                <div class="row"><span class="label">💰 Earnings</span><span class="value gold" id="summaryEarnings">₦0</span></div>
                <div class="row"><span class="label">📊 Status</span><span class="value" id="summaryStatus">-</span></div>
            </div>
        </div>

        <!-- ===== VIDEO LIST SECTION ===== -->
        <div id="videoListSection">
            <div id="videoListContainer">
                <div style="text-align:center; padding:20px; color:#888;">Loading videos...</div>
            </div>
        </div>

        <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>

        <!-- ===== DEBUG INFO ===== -->
        <div class="debug-info" id="debugInfo">🔍 Debug: Waiting for data...</div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';

        const debug = document.getElementById('debugInfo');

        function logDebug(msg) {
            console.log('🔍', msg);
            debug.textContent = '🔍 ' + msg + '\n' + debug.textContent;
        }

        // =============================================
        // GET LOGGED-IN USER
        // =============================================
        const userData = JSON.parse(localStorage.getItem('cashvista_user') || 'null');
        if (!userData) {
            logDebug('❌ No user logged in, redirecting to login');
            window.location.href = 'login.html';
        } else {
            logDebug('✅ User logged in: ' + userData.email);
        }

        // =============================================
        // GET CAMPAIGN ID FROM URL
        // =============================================
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('id');
        logDebug('📝 Campaign ID from URL: ' + (campaignId || 'None'));

        // =============================================
        // VIDEO DATA
        // =============================================
        let videoData = {
            id: null,
            title: 'Loading...',
            duration: 0,
            reward: 0,
            videoUrl: '',
            instructions: ''
        };

        // =============================================
        // STATE VARIABLES
        // =============================================
        let timerInterval = null;
        let timeRemaining = 0;
        let totalEarned = 0;
        let isRunning = false;
        let isCompleted = false;
        let hasClaimed = false;
        let availableVideos = [];
        let selectedVideoId = null;
        let userWatchedVideos = [];

        // =============================================
        // DOM ELEMENTS
        // =============================================
        const timerDisplay = document.getElementById('timerDisplay');
        const currentEarnings = document.getElementById('currentEarnings');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const stopBtn = document.getElementById('stopBtn');
        const summaryBox = document.getElementById('summaryBox');
        const summaryTime = document.getElementById('summaryTime');
        const summaryEarnings = document.getElementById('summaryEarnings');
        const summaryStatus = document.getElementById('summaryStatus');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const videoFrame = document.getElementById('videoFrame');
        const videoLinkBtn = document.getElementById('videoLinkBtn');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoTitle = document.getElementById('videoTitle');
        const videoDuration = document.getElementById('videoDuration');
        const videoReward = document.getElementById('videoReward');
        const videoPlayerSection = document.getElementById('videoPlayerSection');
        const videoListSection = document.getElementById('videoListSection');
        const videoListContainer = document.getElementById('videoListContainer');

        // =============================================
        // FORMAT TIME
        // =============================================
        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            if (seconds >= 3600) {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } else {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
        }

        // =============================================
        // GET DURATION DISPLAY
        // =============================================
        function getDurationDisplay(seconds) {
            if (!seconds || seconds <= 0) return 'N/A';
            if (seconds >= 3600) {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return hours + 'h ' + mins + 'm';
            } else if (seconds >= 60) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return mins + 'm ' + secs + 's';
            } else {
                return seconds + ' seconds';
            }
        }

        // =============================================
        // UPDATE DISPLAY
        // =============================================
        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            currentEarnings.textContent = '₦' + totalEarned.toLocaleString();

            const totalDuration = videoData.duration || 1;
            const progress = ((totalDuration - timeRemaining) / totalDuration) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';

            if (isCompleted) {
                timerDisplay.className = 'timer-display completed';
                progressFill.className = 'progress-fill completed';
            } else if (timeRemaining <= 10 && timeRemaining > 0) {
                timerDisplay.className = 'timer-display warning';
                progressFill.className = 'progress-fill warning';
            } else {
                timerDisplay.className = 'timer-display';
                progressFill.className = 'progress-fill';
            }
        }

        // =============================================
        // DISPLAY VIDEO
        // =============================================
        function displayVideo(url) {
            logDebug('🎥 Displaying video: ' + url);
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                if (videoId) {
                    videoFrame.src = 'https://www.youtube.com/embed/' + videoId[1] + '?autoplay=1&rel=0';
                    videoFrame.style.display = 'block';
                    videoPlaceholder.style.display = 'none';
                    videoLinkBtn.style.display = 'none';
                    logDebug('✅ YouTube video embedded');
                    return;
                }
            }

            if (url.includes('facebook.com') || url.includes('fb.com')) {
                const fbMatch = url.match(/\/videos\/(\d+)/);
                if (fbMatch) {
                    videoFrame.src = 'https://www.facebook.com/plugins/video.php?href=' + encodeURIComponent(url) + '&show_text=0&width=100%';
                    videoFrame.style.display = 'block';
                    videoPlaceholder.style.display = 'none';
                    videoLinkBtn.style.display = 'none';
                    logDebug('✅ Facebook video embedded');
                    return;
                }
            }

            videoFrame.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoLinkBtn.style.display = 'block';
            videoLinkBtn.href = url;
            videoPlaceholder.innerHTML = `
                <div class="icon">🌐</div>
                <p>Watch video on external site</p>
                <p style="font-size:13px; color:#aaa; margin-top:5px;">Click the button below to watch</p>
            `;
            logDebug('🌐 External video link provided');
        }

        // =============================================
        // FETCH USER'S WATCHED VIDEOS
        // =============================================
        async function fetchUserWatchedVideos() {
            try {
                logDebug('📊 Fetching watched videos for: ' + userData.email);
                const response = await fetch(SUPABASE_URL + '/rest/v1/task_completions?user_email=eq.' + encodeURIComponent(userData.email), {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                if (!response.ok) {
                    logDebug('⚠️ Failed to fetch watched videos: ' + response.status);
                    return [];
                }
                const data = await response.json();
                logDebug('✅ Found ' + data.length + ' watched videos');
                return data.map(item => item.campaign_id);
            } catch (e) {
                logDebug('❌ Error fetching watched videos: ' + e.message);
                return [];
            }
        }

        // =============================================
        // FETCH AVAILABLE VIDEOS
        // =============================================
        async function fetchAvailableVideos() {
            try {
                logDebug('📹 Fetching available videos (status=approved)');
                const response = await fetch(SUPABASE_URL + '/rest/v1/campaigns?status=eq.approved&order=date.desc', {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });

                if (!response.ok) {
                    logDebug('⚠️ Failed to fetch videos: ' + response.status);
                    return [];
                }
                const data = await response.json();
                logDebug('✅ Found ' + data.length + ' approved videos');
                return data || [];
            } catch (e) {
                logDebug('❌ Error fetching videos: ' + e.message);
                return [];
            }
        }

        // =============================================
        // RENDER VIDEO LIST
        // =============================================
        function renderVideoList(videos, watchedIds) {
            // Filter out videos the user has already watched
            const availableVideos = videos.filter(v => !watchedIds.includes(v.id));

            logDebug('📋 Available videos: ' + availableVideos.length + ' (after filtering watched)');

            if (videos.length === 0) {
                videoListContainer.innerHTML = `
                    <div class="no-video-msg">
                        <div class="icon">🎬</div>
                        <h3>No Videos Available</h3>
                        <p>There are no approved videos at the moment. Please check back later.</p>
                    </div>
                `;
                return;
            }

            if (availableVideos.length === 0) {
                videoListContainer.innerHTML = `
                    <div class="no-video-msg">
                        <div class="icon">✅</div>
                        <h3>No Tasks Available</h3>
                        <p>You have completed all available tasks. Check back later for new videos!</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div style="margin-bottom:15px;">
                    <p style="color:#888; font-size:14px;">Select a video to watch and earn:</p>
                </div>
                <div class="video-list">
            `;

            availableVideos.forEach(video => {
                html += `
                    <div class="video-list-item" onclick="selectVideo(${video.id})">
                        <div class="info">
                            <h4>${video.title || 'Untitled Video'}</h4>
                            <div class="meta">⏱️ ${getDurationDisplay(video.duration || 300)} • 👥 ${video.viewers || 0} viewers</div>
                            <div class="reward-sm">💰 ₦${(video.duration || 300).toLocaleString()}</div>
                        </div>
                        <button class="btn-select" id="selectBtn_${video.id}">▶️ Watch</button>
                    </div>
                `;
            });

            html += `</div>`;
            videoListContainer.innerHTML = html;
        }

        // =============================================
        // SELECT VIDEO TO WATCH
        // =============================================
        function selectVideo(videoId) {
            logDebug('🎯 User selected video ID: ' + videoId);
            selectedVideoId = videoId;
            const video = availableVideos.find(v => v.id === videoId);
            if (video) {
                videoListSection.style.display = 'none';
                videoPlayerSection.style.display = 'block';
                loadVideo(video);
            } else {
                logDebug('❌ Video not found in available list');
            }
        }

        // =============================================
        // LOAD VIDEO
        // =============================================
        function loadVideo(campaign) {
            logDebug('📺 Loading video: ' + campaign.title);
            const durationInSeconds = campaign.duration || 300;

            videoData = {
                id: campaign.id,
                title: campaign.title || 'Untitled Video',
                duration: durationInSeconds,
                reward: durationInSeconds,
                videoUrl: campaign.video_link || '',
                instructions: campaign.description || ''
            };

            videoTitle.textContent = videoData.title;
            videoDuration.textContent = getDurationDisplay(videoData.duration);
            videoReward.textContent = '₦' + videoData.duration.toLocaleString();

            if (videoData.videoUrl) {
                displayVideo(videoData.videoUrl);
            } else {
                showError('No video link available.');
                logDebug('❌ No video link available');
                return;
            }

            // Reset timer
            timeRemaining = videoData.duration;
            totalEarned = 0;
            isRunning = false;
            isCompleted = false;
            hasClaimed = false;
            updateDisplay();
            statusText.textContent = '▶️ Video loaded. Starting in 2 seconds...';
            stopBtn.textContent = '⏹️ Stop & Claim Earnings';
            stopBtn.disabled = false;
            stopBtn.className = 'btn-stop';
            summaryBox.style.display = 'none';

            logDebug('⏱️ Duration: ' + durationInSeconds + ' seconds');
            logDebug('💰 Reward: ₦' + durationInSeconds);

            setTimeout(() => startTimer(), 2000);
        }

        // =============================================
        // START TIMER - COUNTS DOWN TO ZERO
        // =============================================
        function startTimer() {
            if (isRunning) return;
            if (isCompleted) return;
            if (timeRemaining <= 0) {
                completeWatching();
                return;
            }

            logDebug('▶️ Timer started');
            isRunning = true;
            stopBtn.textContent = '⏹️ Stop & Claim Earnings';
            stopBtn.disabled = false;
            statusText.textContent = '⏳ Watching... Timer will stop automatically';

            timerInterval = setInterval(() => {
                timeRemaining = timeRemaining - 1;
                totalEarned = Math.max(0, (videoData.duration - timeRemaining));
                updateDisplay();

                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    totalEarned = videoData.duration;
                    updateDisplay();
                    logDebug('⏹️ Timer reached 0! Auto-completing...');
                    completeWatching();
                    return;
                }

                currentEarnings.textContent = '₦' + totalEarned.toLocaleString();

            }, 1000);
        }

        // =============================================
        // COMPLETE WATCHING - AUTO CREDIT
        // =============================================
        async function completeWatching() {
            if (isCompleted || hasClaimed) return;

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            isRunning = false;
            isCompleted = true;
            timeRemaining = 0;
            totalEarned = videoData.duration;

            updateDisplay();
            timerDisplay.className = 'timer-display completed';
            progressFill.className = 'progress-fill completed';
            statusText.textContent = '✅ Completed! Earnings credited to your wallet.';

            stopBtn.textContent = '✅ Completed';
            stopBtn.disabled = true;
            stopBtn.className = 'btn-completed';

            summaryBox.style.display = 'block';
            summaryTime.textContent = videoData.duration + 's (Full Duration)';
            summaryEarnings.textContent = '₦' + totalEarned.toLocaleString();
            summaryStatus.textContent = '✅ Completed & Credited';

            showSuccess('✅ Video completed! ₦' + totalEarned.toLocaleString() + ' credited to your wallet.');
            logDebug('💰 Crediting ₦' + totalEarned + ' to user');
            await creditUserEarnings(totalEarned);
            hasClaimed = true;

            setTimeout(() => {
                videoPlayerSection.style.display = 'none';
                videoListSection.style.display = 'block';
                loadVideoList();
            }, 3000);
        }

        // =============================================
        // STOP & CLAIM - Manual stop
        // =============================================
        async function stopWatching() {
            if (isCompleted || hasClaimed) return;
            if (!isRunning) {
                showError('❌ Please start watching the video first.');
                return;
            }

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            isRunning = false;
            isCompleted = true;

            const secondsWatched = videoData.duration - timeRemaining;
            totalEarned = Math.max(0, secondsWatched);

            updateDisplay();
            statusText.textContent = '⏹️ Stopped. Earnings credited.';
            stopBtn.textContent = '✅ Claimed';
            stopBtn.disabled = true;
            stopBtn.className = 'btn-completed';

            summaryBox.style.display = 'block';
            summaryTime.textContent = secondsWatched + 's';
            summaryEarnings.textContent = '₦' + totalEarned.toLocaleString();
            summaryStatus.textContent = '✅ Claimed';

            showSuccess('✅ ₦' + totalEarned.toLocaleString() + ' credited to your wallet!');
            logDebug('💰 Manual stop: Crediting ₦' + totalEarned);
            await creditUserEarnings(totalEarned);
            hasClaimed = true;

            setTimeout(() => {
                videoPlayerSection.style.display = 'none';
                videoListSection.style.display = 'block';
                loadVideoList();
            }, 3000);
        }

        // =============================================
        // CREDIT EARNINGS
        // =============================================
        async function creditUserEarnings(amount) {
            if (amount <= 0) {
                showError('❌ No earnings to credit.');
                return;
            }

            try {
                logDebug('💰 Updating user balance...');
                await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(userData.email), {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        balance: (userData.balance || 0) + amount,
                        total_earned: (userData.total_earned || 0) + amount
                    })
                });

                logDebug('💰 Recording transaction...');
                await fetch(SUPABASE_URL + '/rest/v1/wallet_transactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        user_email: userData.email,
                        type: 'earnings',
                        amount: amount,
                        description: 'Video watching: ' + videoData.title,
                        status: 'completed',
                        created_at: new Date().toISOString()
                    })
                });

                logDebug('📝 Recording task completion...');
                await fetch(SUPABASE_URL + '/rest/v1/task_completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        user_email: userData.email,
                        campaign_id: videoData.id,
                        seconds_watched: videoData.duration - timeRemaining,
                        amount_earned: amount,
                        status: 'completed',
                        completed_at: new Date().toISOString()
                    })
                });

                userData.balance = (userData.balance || 0) + amount;
                userData.total_earned = (userData.total_earned || 0) + amount;
                localStorage.setItem('cashvista_user', JSON.stringify(userData));

                logDebug('✅ Successfully credited ₦' + amount);

            } catch (error) {
                console.error('Error crediting earnings:', error);
                logDebug('❌ Error crediting earnings: ' + error.message);
                showError('❌ Error crediting earnings.');
            }
        }

        // =============================================
        // LOAD VIDEO LIST
        // =============================================
        async function loadVideoList() {
            logDebug('🔄 Loading video list...');
            videoListContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Loading videos...</div>';

            const videos = await fetchAvailableVideos();
            const watchedIds = await fetchUserWatchedVideos();

            availableVideos = videos;

            if (videos.length === 0) {
                videoListContainer.innerHTML = `
                    <div class="no-video-msg">
                        <div class="icon">🎬</div>
                        <h3>No Videos Available</h3>
                        <p>There are no videos available at the moment. Please check back later.</p>
                    </div>
                `;
                return;
            }

            renderVideoList(videos, watchedIds);
        }

        // =============================================
        // MESSAGES
        // =============================================
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
        }

        // =============================================
        // PREVENT PAGE REFRESH
        // =============================================
        window.addEventListener('beforeunload', (e) => {
            if (isRunning && !isCompleted) {
                e.preventDefault();
                e.returnValue = 'You are currently watching a video. Are you sure you want to leave?';
            }
        });

        // =============================================
        // INITIALIZE
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            logDebug('🚀 Page loaded');

            if (campaignId) {
                logDebug('📝 Loading specific video from URL: ' + campaignId);
                videoListSection.style.display = 'none';
                videoPlayerSection.style.display = 'block';
                fetch(SUPABASE_URL + '/rest/v1/campaigns?id=eq.' + campaignId, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                })
                .then(res => {
                    logDebug('📡 API Response status: ' + res.status);
                    return res.json();
                })
                .then(data => {
                    logDebug('📊 Campaign data: ' + JSON.stringify(data));
                    if (data && data.length > 0 && data[0].status === 'approved') {
                        loadVideo(data[0]);
                    } else {
                        logDebug('❌ Video not available or not approved');
                        showError('Video not available. Please select another.');
                        videoListSection.style.display = 'block';
                        videoPlayerSection.style.display = 'none';
                        loadVideoList();
                    }
                })
                .catch(err => {
                    logDebug('❌ Error loading specific video: ' + err.message);
                    videoListSection.style.display = 'block';
                    videoPlayerSection.style.display = 'none';
                    loadVideoList();
                });
            } else {
                logDebug('📋 Showing available videos list');
                videoListSection.style.display = 'block';
                videoPlayerSection.style.display = 'none';
                loadVideoList();
            }
        });
    </script>
</body>
</html>
