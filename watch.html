<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch & Earn - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .watch-container {
            background: #fff;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 95%;
        }
        .watch-container .logo {
            font-size: 28px;
            font-weight: 800;
            color: #f5c842;
            text-align: center;
            margin-bottom: 5px;
        }
        .watch-container .logo span { color: #0d1b2a; }
        .watch-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .video-info {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #f5c842;
        }
        .video-info h3 {
            color: #0d1b2a;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .video-info p {
            color: #555;
            font-size: 14px;
        }
        .video-info .reward {
            font-size: 20px;
            font-weight: 800;
            color: #f5c842;
        }
        .video-wrapper {
            background: #0d1b2a;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 320px;
            border: none;
        }
        .video-wrapper .video-link-btn {
            display: inline-block;
            background: #f5c842;
            color: #0d1b2a;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
        }
        .video-wrapper .video-link-btn:hover {
            background: #e6b800;
            transform: scale(1.05);
        }
        .video-wrapper .video-placeholder {
            text-align: center;
            color: #fff;
            padding: 30px;
        }
        .video-wrapper .video-placeholder .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .timer-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #e8ecf0;
        }
        .timer-section .timer-display {
            font-size: 52px;
            font-weight: 800;
            color: #0d1b2a;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
        }
        .timer-section .timer-display.warning {
            color: #c62828;
            animation: blink 0.5s infinite;
        }
        .timer-section .timer-display.completed {
            color: #2e7d32;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .timer-section .earnings-display {
            font-size: 22px;
            font-weight: 700;
            color: #f5c842;
            margin-top: 5px;
        }
        .timer-section .status-text {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e8ecf0;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: #f5c842;
            border-radius: 4px;
            transition: width 1s linear;
            width: 0%;
        }
        .progress-bar .progress-fill.completed {
            background: #2e7d32;
        }
        .progress-bar .progress-fill.warning {
            background: #c62828;
        }
        .btn-stop {
            width: 100%;
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-stop:hover { background: #c62828; transform: scale(1.02); }
        .btn-stop:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-completed {
            width: 100%;
            background: #2e7d32;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-completed:hover { background: #1b5e20; transform: scale(1.02); }
        .btn-completed:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .summary-box {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid #e8ecf0;
            display: none;
        }
        .summary-box .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 14px;
        }
        .summary-box .row .label { color: #888; }
        .summary-box .row .value { font-weight: 700; color: #0d1b2a; }
        .summary-box .row .value.gold { color: #f5c842; }
        .error-msg {
            background: #fce4ec;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .btn-back {
            display: inline-block;
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            margin-top: 10px;
            text-align: center;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }
        .btn-back:hover { background: #ccc; }
        .no-video-msg {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .no-video-msg .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .no-video-msg h3 {
            color: #0d1b2a;
            margin-bottom: 10px;
        }
        .video-list {
            margin-top: 15px;
        }
        .video-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #e8ecf0;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-list-item:hover {
            border-color: #f5c842;
            background: #fef7e0;
        }
        .video-list-item .info {
            flex: 1;
        }
        .video-list-item .info h4 {
            font-size: 15px;
            color: #0d1b2a;
        }
        .video-list-item .info .meta {
            font-size: 12px;
            color: #888;
        }
        .video-list-item .info .reward-sm {
            font-size: 14px;
            font-weight: 700;
            color: #f5c842;
        }
        .video-list-item .btn-select {
            background: #f5c842;
            color: #0d1b2a;
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-list-item .btn-select:hover {
            background: #e6b800;
        }
        .login-prompt {
            text-align: center;
            padding: 40px 20px;
        }
        .login-prompt .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .login-prompt h3 {
            color: #0d1b2a;
            margin-bottom: 10px;
        }
        .login-prompt .btn-login {
            display: inline-block;
            padding: 12px 40px;
            background: #f5c842;
            color: #0d1b2a;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .watch-container { padding: 20px 15px; }
            .video-wrapper iframe { height: 200px; }
            .timer-section .timer-display { font-size: 36px; }
            .video-list-item {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="watch-container">
        <div class="logo">▶Cash<span>Vista</span></div>
        <p class="subtitle">🎬 Watch & Earn</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <!-- ===== VIDEO PLAYER ===== -->
        <div id="videoPlayerSection" style="display:none;">
            <div class="video-info">
                <h3 id="videoTitle">Loading video...</h3>
                <p>⏱️ Duration: <span id="videoDuration">0</span></p>
                <p>💰 Reward: <span class="reward" id="videoReward">₦0</span></p>
            </div>

            <div class="video-wrapper">
                <div class="video-placeholder" id="videoPlaceholder">
                    <div class="icon">📹</div>
                    <p>Loading video...</p>
                </div>
                <iframe id="videoFrame" src="" allowfullscreen style="display:none;"></iframe>
                <a href="#" id="videoLinkBtn" class="video-link-btn" target="_blank" style="display:none;">
                    ▶️ Watch on External Site
                </a>
            </div>

            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="earnings-display">💰 <span id="currentEarnings">₦0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">⏳ Loading...</div>
            </div>

            <button class="btn-stop" id="stopBtn" onclick="stopWatching()">⏹️ Stop & Claim Earnings</button>

            <div class="summary-box" id="summaryBox">
                <div class="row"><span class="label">⏱️ Time Watched</span><span class="value" id="summaryTime">0s</span></div>
                <div class="row"><span class="label">💰 Earnings</span><span class="value gold" id="summaryEarnings">₦0</span></div>
                <div class="row"><span class="label">📊 Status</span><span class="value" id="summaryStatus">-</span></div>
            </div>
        </div>

        <!-- ===== VIDEO LIST ===== -->
        <div id="videoListSection">
            <div id="videoListContainer" style="text-align:center; padding:20px; color:#888;">Loading videos...</div>
        </div>

        <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://jblfciwnddqokyiuzmgd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nge3ZsQ3TmI54oR2ySSb7w_Tj322Hke';

        console.log('🚀 Watch & Earn page loaded');

        // =============================================
        // GET USER DATA - TRY MULTIPLE WAYS
        // =============================================
        let userData = null;
        let userEmail = null;

        // Method 1: localStorage
        try {
            const stored = localStorage.getItem('cashvista_user');
            if (stored) {
                userData = JSON.parse(stored);
                userEmail = userData.email;
                console.log('✅ User found in localStorage:', userEmail);
            }
        } catch (e) {
            console.log('❌ Error reading localStorage:', e);
        }

        // Method 2: sessionStorage
        if (!userData) {
            try {
                const email = sessionStorage.getItem('userEmail');
                if (email) {
                    userEmail = email;
                    console.log('📧 Found email in sessionStorage:', userEmail);
                }
            } catch (e) {
                console.log('❌ Error reading sessionStorage:', e);
            }
        }

        // Method 3: URL parameter
        if (!userData && !userEmail) {
            const params = new URLSearchParams(window.location.search);
            const emailParam = params.get('email');
            if (emailParam) {
                userEmail = emailParam;
                console.log('📧 Found email in URL:', userEmail);
            }
        }

        console.log('📝 Final user email:', userEmail || 'Not found');
        console.log('👤 Final user data:', userData ? 'Found' : 'Not found');

        // =============================================
        // FETCH USER FROM SUPABASE IF ONLY EMAIL AVAILABLE
        // =============================================
        async function fetchUserFromSupabase() {
            if (userData) return userData;
            if (!userEmail) return null;

            try {
                console.log('🔄 Fetching user from Supabase:', userEmail);
                const response = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(userEmail), {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                if (!response.ok) {
                    console.log('⚠️ Failed to fetch user:', response.status);
                    return null;
                }
                const users = await response.json();
                if (users && users.length > 0) {
                    userData = users[0];
                    localStorage.setItem('cashvista_user', JSON.stringify(userData));
                    console.log('✅ User fetched from Supabase:', userData.email);
                    return userData;
                }
                return null;
            } catch (e) {
                console.log('❌ Error fetching user:', e.message);
                return null;
            }
        }

        // =============================================
        // STATE
        // =============================================
        let videoData = {};
        let timerInterval = null;
        let timeRemaining = 0;
        let totalEarned = 0;
        let isRunning = false;
        let isCompleted = false;
        let hasClaimed = false;
        let availableVideos = [];

        // =============================================
        // DOM REFS
        // =============================================
        const timerDisplay = document.getElementById('timerDisplay');
        const currentEarnings = document.getElementById('currentEarnings');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const stopBtn = document.getElementById('stopBtn');
        const summaryBox = document.getElementById('summaryBox');
        const summaryTime = document.getElementById('summaryTime');
        const summaryEarnings = document.getElementById('summaryEarnings');
        const summaryStatus = document.getElementById('summaryStatus');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const videoFrame = document.getElementById('videoFrame');
        const videoLinkBtn = document.getElementById('videoLinkBtn');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoTitle = document.getElementById('videoTitle');
        const videoDuration = document.getElementById('videoDuration');
        const videoReward = document.getElementById('videoReward');
        const videoPlayerSection = document.getElementById('videoPlayerSection');
        const videoListSection = document.getElementById('videoListSection');
        const videoListContainer = document.getElementById('videoListContainer');

        // =============================================
        // HELPERS
        // =============================================
        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function getDurationDisplay(seconds) {
            if (!seconds) return 'N/A';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins + 'm ' + secs + 's';
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            currentEarnings.textContent = '₦' + totalEarned;
            const progress = ((videoData.duration - timeRemaining) / videoData.duration) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
            if (isCompleted) {
                timerDisplay.className = 'timer-display completed';
                progressFill.className = 'progress-fill completed';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
            console.log('❌ Error:', msg);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
            console.log('✅ Success:', msg);
        }

        // =============================================
        // DISPLAY VIDEO
        // =============================================
        function displayVideo(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                if (videoId) {
                    videoFrame.src = 'https://www.youtube.com/embed/' + videoId[1] + '?autoplay=1&rel=0';
                    videoFrame.style.display = 'block';
                    videoPlaceholder.style.display = 'none';
                    videoLinkBtn.style.display = 'none';
                    return;
                }
            }
            videoFrame.style.display = 'none';
            videoPlaceholder.style.display = 'block';
            videoLinkBtn.style.display = 'block';
            videoLinkBtn.href = url;
            videoPlaceholder.innerHTML = `
                <div class="icon">🌐</div>
                <p>Watch video on external site</p>
                <p style="font-size:13px; color:#aaa; margin-top:5px;">Click the button below to watch</p>
            `;
        }

        // =============================================
        // LOAD VIDEO
        // =============================================
        function loadVideo(campaign) {
            console.log('📺 Loading video:', campaign.title);
            videoData = {
                id: campaign.id,
                title: campaign.title || 'Untitled Video',
                duration: campaign.duration || 300,
                videoUrl: campaign.video_link || ''
            };

            videoTitle.textContent = videoData.title;
            videoDuration.textContent = getDurationDisplay(videoData.duration);
            videoReward.textContent = '₦' + videoData.duration;

            if (videoData.videoUrl) {
                displayVideo(videoData.videoUrl);
                console.log('✅ Video URL set:', videoData.videoUrl);
            } else {
                showError('No video link available.');
                return;
            }

            timeRemaining = videoData.duration;
            totalEarned = 0;
            isRunning = false;
            isCompleted = false;
            hasClaimed = false;
            updateDisplay();
            statusText.textContent = '▶️ Starting in 2 seconds...';
            stopBtn.disabled = false;
            stopBtn.className = 'btn-stop';
            summaryBox.style.display = 'none';

            setTimeout(() => startTimer(), 2000);
        }

        // =============================================
        // START TIMER - COUNTS DOWN
        // =============================================
        function startTimer() {
            if (isRunning || isCompleted || timeRemaining <= 0) {
                if (timeRemaining <= 0) completeWatching();
                return;
            }

            console.log('▶️ Timer started, duration:', timeRemaining);
            isRunning = true;
            statusText.textContent = '⏳ Watching... Timer will stop automatically';

            timerInterval = setInterval(() => {
                timeRemaining--;
                totalEarned = videoData.duration - timeRemaining;
                updateDisplay();

                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    totalEarned = videoData.duration;
                    updateDisplay();
                    console.log('⏹️ Timer reached 0!');
                    completeWatching();
                }
                currentEarnings.textContent = '₦' + totalEarned;
            }, 1000);
        }

        // =============================================
        // COMPLETE WATCHING - AUTO CREDIT
        // =============================================
        async function completeWatching() {
            if (isCompleted || hasClaimed) return;
            clearInterval(timerInterval);
            isRunning = false;
            isCompleted = true;
            timeRemaining = 0;
            totalEarned = videoData.duration;

            updateDisplay();
            timerDisplay.className = 'timer-display completed';
            progressFill.className = 'progress-fill completed';
            statusText.textContent = '✅ Completed! Earnings credited.';

            stopBtn.textContent = '✅ Completed';
            stopBtn.disabled = true;
            stopBtn.className = 'btn-completed';

            summaryBox.style.display = 'block';
            summaryTime.textContent = videoData.duration + 's';
            summaryEarnings.textContent = '₦' + totalEarned;
            summaryStatus.textContent = '✅ Completed';

            showSuccess('✅ Credited ₦' + totalEarned + ' to your wallet!');
            await creditUserEarnings(totalEarned);
            hasClaimed = true;

            setTimeout(() => {
                videoPlayerSection.style.display = 'none';
                videoListSection.style.display = 'block';
                loadVideoList();
            }, 3000);
        }

        // =============================================
        // STOP WATCHING - MANUAL
        // =============================================
        async function stopWatching() {
            if (isCompleted || hasClaimed || !isRunning) {
                if (!isRunning) showError('Please start watching first.');
                return;
            }

            clearInterval(timerInterval);
            isRunning = false;
            isCompleted = true;

            const secondsWatched = videoData.duration - timeRemaining;
            totalEarned = secondsWatched;

            updateDisplay();
            statusText.textContent = '⏹️ Stopped. Earnings credited.';
            stopBtn.textContent = '✅ Claimed';
            stopBtn.disabled = true;
            stopBtn.className = 'btn-completed';

            summaryBox.style.display = 'block';
            summaryTime.textContent = secondsWatched + 's';
            summaryEarnings.textContent = '₦' + totalEarned;
            summaryStatus.textContent = '✅ Claimed';

            showSuccess('✅ ₦' + totalEarned + ' credited!');
            await creditUserEarnings(totalEarned);
            hasClaimed = true;

            setTimeout(() => {
                videoPlayerSection.style.display = 'none';
                videoListSection.style.display = 'block';
                loadVideoList();
            }, 3000);
        }

        // =============================================
        // CREDIT EARNINGS
        // =============================================
        async function creditUserEarnings(amount) {
            if (!userData || amount <= 0) {
                console.log('⚠️ Cannot credit: No user or amount 0');
                return;
            }
            try {
                console.log('💰 Crediting ₦' + amount + ' to', userData.email);
                await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(userData.email), {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    },
                    body: JSON.stringify({ balance: (userData.balance || 0) + amount })
                });
                userData.balance = (userData.balance || 0) + amount;
                localStorage.setItem('cashvista_user', JSON.stringify(userData));
                console.log('✅ Credited successfully');
            } catch (e) {
                console.error('❌ Credit error:', e);
            }
        }

        // =============================================
        // SELECT VIDEO
        // =============================================
        function selectVideo(videoId) {
            console.log('🎯 Selected video ID:', videoId);
            const video = availableVideos.find(v => v.id === videoId);
            if (video) {
                videoListSection.style.display = 'none';
                videoPlayerSection.style.display = 'block';
                loadVideo(video);
            } else {
                showError('Video not found');
            }
        }

        // =============================================
        // LOAD VIDEO LIST
        // =============================================
        async function loadVideoList() {
            console.log('📋 Loading video list...');

            // If no user data, show login prompt
            if (!userData) {
                console.log('⚠️ No user data, showing login prompt');
                videoListContainer.innerHTML = `
                    <div class="login-prompt">
                        <div class="icon">🔐</div>
                        <h3>Please Login</h3>
                        <p>You need to be logged in to watch videos and earn.</p>
                        <a href="login.html" class="btn-login">🔑 Login</a>
                        <br>
                        <a href="register.html" style="display:inline-block; margin-top:10px; color:#f5c842; text-decoration:underline;">Create Account</a>
                    </div>
                `;
                return;
            }

            videoListContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Loading videos...</div>';

            try {
                console.log('🔄 Fetching approved videos...');
                const res = await fetch(SUPABASE_URL + '/rest/v1/campaigns?status=eq.approved&order=date.desc', {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });

                if (!res.ok) {
                    console.log('⚠️ Failed to fetch videos:', res.status);
                    throw new Error('Failed to fetch videos');
                }

                const videos = await res.json();
                availableVideos = videos || [];
                console.log('✅ Found', videos.length, 'approved videos');

                if (videos.length === 0) {
                    videoListContainer.innerHTML = `
                        <div class="no-video-msg">
                            <div class="icon">🎬</div>
                            <h3>No Videos Available</h3>
                            <p>There are no approved videos at the moment. Check back later!</p>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="video-list">';
                videos.forEach(v => {
                    html += `
                        <div class="video-list-item" onclick="selectVideo(${v.id})">
                            <div class="info">
                                <h4>${v.title || 'Untitled Video'}</h4>
                                <div class="meta">⏱️ ${getDurationDisplay(v.duration || 300)}</div>
                                <div class="reward-sm">💰 ₦${(v.duration || 300)}</div>
                            </div>
                            <button class="btn-select">▶️ Watch</button>
                        </div>
                    `;
                });
                html += '</div>';
                videoListContainer.innerHTML = html;
                console.log('✅ Video list rendered');

            } catch (e) {
                console.error('❌ Error loading videos:', e);
                videoListContainer.innerHTML = `
                    <div class="no-video-msg">
                        <div class="icon">❌</div>
                        <h3>Error Loading Videos</h3>
                        <p>${e.message || 'Please try again.'}</p>
                        <button onclick="loadVideoList()" style="margin-top:15px; padding:10px 30px; background:#f5c842; border:none; border-radius:30px; font-weight:700; cursor:pointer;">🔄 Retry</button>
                    </div>
                `;
            }
        }

        // =============================================
        // INIT - RUN THIS WHEN PAGE LOADS
        // =============================================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 DOM loaded, initializing...');

            // Try to get user from Supabase if we have email
            if (!userData && userEmail) {
                console.log('🔄 Fetching user from Supabase...');
                await fetchUserFromSupabase();
            }

            // Load videos
            await loadVideoList();
            console.log('✅ Initialization complete');
        });

        // Also run immediately in case DOM already loaded
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            console.log('🚀 Page already loaded, initializing...');
            (async function() {
                if (!userData && userEmail) {
                    await fetchUserFromSupabase();
                }
                await loadVideoList();
                console.log('✅ Initialization complete');
            })();
        }
    </script>
</body>
</html>
