<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - CashVista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
        }
        .topbar {
            background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 100%);
            color: #fff;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .logo {
            font-size: 28px;
            font-weight: 800;
            color: #f5c842;
        }
        .topbar .logo span { color: #fff; }
        .topbar .logo .play-icon { color: #f5c842; margin-right: 5px; }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .topbar .user-info .greeting {
            color: #ddd;
            font-size: 14px;
        }
        .topbar .user-info .greeting strong {
            color: #f5c842;
            font-weight: 700;
        }
        .topbar .user-info .balance-badge {
            background: rgba(245, 200, 66, 0.15);
            border: 1px solid #f5c842;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            color: #f5c842;
        }
        .topbar .user-info .logout {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
        }
        .topbar .user-info .logout:hover {
            background: #e74c3c;
            color: #fff;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 25px 20px;
        }
        .welcome-banner {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 100%);
            color: #fff;
            padding: 30px 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 30px rgba(13,27,42,0.2);
        }
        .welcome-banner h1 {
            font-size: 28px;
            font-weight: 800;
        }
        .welcome-banner h1 span { color: #f5c842; }
        .welcome-banner p {
            color: #aac;
            font-size: 15px;
            margin-top: 4px;
        }
        .welcome-banner .stats-mini {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .welcome-banner .stats-mini .stat-item {
            text-align: center;
        }
        .welcome-banner .stats-mini .stat-item .num {
            font-size: 22px;
            font-weight: 800;
            color: #f5c842;
        }
        .welcome-banner .stats-mini .stat-item .label {
            font-size: 12px;
            color: #aac;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 25px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.1);
        }
        .card .card-icon { font-size: 32px; margin-bottom: 8px; }
        .card h3 {
            color: #0d1b2a;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card .value {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
            margin: 4px 0 2px;
        }
        .card .sub {
            color: #888;
            font-size: 13px;
            font-weight: 400;
        }
        .card .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            margin-top: 12px;
            width: 100%;
        }
        .card .btn-gold {
            background: #f5c842;
            color: #0d1b2a;
        }
        .card .btn-gold:hover {
            background: #e6b800;
            transform: scale(1.02);
        }
        .card .btn-green {
            background: #2e7d32;
            color: #fff;
        }
        .card .btn-green:hover {
            background: #1b5e20;
        }
        .card .btn-blue {
            background: #1976d2;
            color: #fff;
        }
        .card .btn-blue:hover {
            background: #1565c0;
        }
        .card .btn-outline {
            background: transparent;
            color: #0d1b2a;
            border: 2px solid #0d1b2a;
        }
        .card .btn-outline:hover {
            background: #0d1b2a;
            color: #fff;
        }
        .card .btn-purple {
            background: #7b1fa2;
            color: #fff;
        }
        .card .btn-purple:hover {
            background: #6a1b9a;
        }
        .card .btn-teal {
            background: #00897b;
            color: #fff;
        }
        .card .btn-teal:hover {
            background: #00796b;
        }
        .card .referral-link-box {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            word-break: break-all;
            margin-top: 10px;
            border: 1px dashed #f5c842;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card .referral-link-box .link-text {
            color: #0d1b2a;
            font-weight: 500;
            font-size: 12px;
        }
        .card .referral-link-box .copy-btn-sm {
            background: #0d1b2a;
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .card .referral-link-box .copy-btn-sm:hover {
            background: #1b3a5c;
        }
        .card .badge-mini {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-mini.gold {
            background: #f5c842;
            color: #0d1b2a;
        }
        .badge-mini.green {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .card-gradient-1 { background: linear-gradient(135deg, #fff 60%, #fef7e0); }
        .card-gradient-2 { background: linear-gradient(135deg, #fff 60%, #e8f5e9); }
        .card-gradient-3 { background: linear-gradient(135deg, #fff 60%, #e3f2fd); }
        .card-gradient-4 { background: linear-gradient(135deg, #fff 60%, #fce4ec); }
        .card-gradient-5 { background: linear-gradient(135deg, #fff 60%, #f3e5f5); }
        .card-gradient-6 { background: linear-gradient(135deg, #fff 60%, #e0f7fa); }
        .table-section {
            background: #fff;
            border-radius: 20px;
            padding: 25px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            margin-top: 10px;
        }
        .table-section .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .table-section .header h3 {
            color: #0d1b2a;
            font-size: 20px;
            font-weight: 700;
        }
        .table-section table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .table-section th {
            background: #0d1b2a;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .table-section td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        .table-section tr:hover td {
            background: #f8fafc;
        }
        .table-section .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-badge.warning {
            background: #fff3e0;
            color: #e65100;
        }
        .status-badge.danger {
            background: #fce4ec;
            color: #c62828;
        }
        .footer {
            background: #0d1b2a;
            color: #aaa;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-radius: 20px 20px 0 0;
        }
        .footer .founder {
            color: #f5c842;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .topbar { flex-direction: column; gap: 12px; text-align: center; padding: 15px; }
            .topbar .user-info { justify-content: center; }
            .welcome-banner { flex-direction: column; text-align: center; padding: 25px 20px; }
            .welcome-banner .stats-mini { justify-content: center; margin-top: 12px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .table-section { padding: 18px; overflow-x: auto; }
            .table-section table { font-size: 12px; }
            .table-section th, .table-section td { padding: 8px 10px; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

        <div class="logo">
            <span class="play-icon">▶</span>Cash<span>Vista</span>
        </div>
        <div class="user-info">

            <span class="balance-badge">💰 <span id="userBalance">₦0.00</span></span>
            <button class="logout" onclick="logout()">🚪 Logout</button>

    </div>

                    <div class="label">Total Earned</div>

                    <div class="num" id="statTasks">0</div>
                    <div class="label">Tasks Available</div>

        </div>

                <div style="margin:8px 0;">
